name: Build Caroline Companion

# Triggers when you push a tag like: companion-v0.1.0
# git tag companion-v0.1.0 && git push origin companion-v0.1.0
on:
  push:
    tags:
      - 'companion-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows installer (.msi)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            assetNamePattern: 'Windows_Project.Caroline.Companion_[version]_[arch]_en-US[setup][ext]'

          # Linux — Ubuntu/Pop!_OS/Steam Deck desktop packages
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            assetNamePattern: 'Linux_Project.Caroline.Companion_[version]_[arch][ext]'

          # macOS — Intel + Rosetta 2 (runs on all Macs)
          - os: macos-latest
            target: x86_64-apple-darwin
            assetNamePattern: 'MacIntel_Project.Caroline.Companion_[version]_[arch][ext]'

          # macOS — Apple Silicon native (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            assetNamePattern: 'MacAppleSilicon_Project.Caroline.Companion_[version]_[arch][ext]'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: caroline-companion/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install frontend dependencies
        working-directory: caroline-companion
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: caroline-companion
          tagName: ${{ github.ref_name }}
          releaseName: 'Caroline Companion ${{ github.ref_name }}'
          releaseBody: |
            ## Caroline Companion ${{ github.ref_name }}

            A retro AIM-style chat window for your Caroline AI.

            **Download the right file for your platform:**
            - Windows → `Windows_Project.Caroline.Companion_*_x64_en-US.msi`
            - Ubuntu / Pop!_OS → `Linux_Project.Caroline.Companion_*_amd64.deb`
            - Steam Deck Desktop Mode → `Linux_Project.Caroline.Companion_*_amd64.AppImage`
            - Mac (M1/M2/M3) → `MacAppleSilicon_Project.Caroline.Companion_*_aarch64.dmg`
            - Mac (Intel) → `MacIntel_Project.Caroline.Companion_*_x64.dmg`

            **First run on Mac:** Right-click the app → Open (bypasses the unsigned app warning).
          releaseDraft: false
          prerelease: false
          assetNamePattern: ${{ matrix.assetNamePattern }}
          args: --target ${{ matrix.target }}
