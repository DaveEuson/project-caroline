name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  grep-hardcoded:
    name: Check for hardcoded API keys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for common key patterns
        run: |
          set +e
          FAIL=0

          # OpenRouter / OpenAI keys
          if grep -rn 'sk-or-[a-zA-Z0-9\-]\{20,\}' --include="*.html" --include="*.js" --include="*.json" .; then
            echo "::error::Possible OpenRouter key found"
            FAIL=1
          fi

          # Generic API key assignments (not placeholder values)
          if grep -rEn '"(apiKey|api_key|openrouterKey|hueKey|discordToken)"\s*:\s*"[^"]{16,}"' \
               --include="*.html" --include="*.js" .; then
            echo "::error::Possible hardcoded API key assignment found"
            FAIL=1
          fi

          # Hue username format (40-char hex)
          if grep -rEn '"hueKey"\s*:\s*"[0-9a-f]{32,}"' --include="*.html" --include="*.js" .; then
            echo "::error::Possible hardcoded Hue API key found"
            FAIL=1
          fi

          exit $FAIL
